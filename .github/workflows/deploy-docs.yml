name: Deploy Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            es-plus-docs/package-lock.json

      # Install at root so workspaces (@es-plus/vue3 etc.) get linked AND
      # root devDeps (husky) get installed. Without --legacy-peer-deps the
      # docs site's @unhead/vue + vite peer ranges conflict in npm 10+.
      - name: Install monorepo deps
        run: npm ci --legacy-peer-deps

      - name: Install docs site deps
        run: cd es-plus-docs && npm ci --legacy-peer-deps

      - name: Build docs site
        run: cd es-plus-docs && npm run build
        env:
          VITE_BASE_URL: /es-plus/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: es-plus-docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
