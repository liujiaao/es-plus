name: ✨ Feature Request
description: 提议一个新功能或增强
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ES-Plus 强调"一份配置跑两个渲染层"的核心抽象。请说清你的提议**为什么应该是组件库的一部分**，而不是业务层的事。

  - type: dropdown
    id: package
    attributes:
      label: 涉及的包
      multiple: true
      options:
        - "@es-plus/vue3"
        - "@es-plus/vue2"
        - "@es-plus/core (双渲染层共享)"
        - "@es-plus/cli"
        - "@es-plus/mcp-server"
        - "es-plus-docs"
        - "新包 / 不确定"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 用例 / 动机
      description: 你想做什么？现在做不到的具体场景是什么？
      placeholder: |
        - 业务背景：...
        - 用现有功能能做到 / 做不到的事：...
        - 影响范围（多少用户会用到）：...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: |
        如果有具体的 API 设计、配置 schema、行为流程，请写出来。
        理想格式：用代码块给出**期望的使用代码**，再描述背后的实现。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / 现有 workaround
      description: 你考虑过的其他做法？为什么它们不够好？
    validations:
      required: false

  - type: textarea
    id: compat
    attributes:
      label: 兼容性影响
      description: |
        - 是否 breaking change（是 → 必须走 major bump）
        - 对 Vue 2 / Vue 3 双渲染层的影响差异
        - 对包体积的预估影响
    validations:
      required: true

  - type: dropdown
    id: willing-to-pr
    attributes:
      label: 是否愿意提 PR 实现
      options:
        - "是 —— 我会发 PR"
        - "也许 —— 给些指引我可以试试"
        - "否 —— 仅提议"
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: 确认
      options:
        - label: 我已搜索现有 issue / discussion，没有相同提议
          required: true
        - label: 我已阅读 [CONTRIBUTING.md](../blob/master/CONTRIBUTING.md) 的"设计哲学"段
          required: true
